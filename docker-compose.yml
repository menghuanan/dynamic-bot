version: '3.8'

services:
  dynamic-bot:
    # 构建配置
    build:
      context: .
      dockerfile: Dockerfile
      args:
        APP_VERSION: auto

    # 镜像标签
    image: dynamic-bot:latest

    # 容器名称
    container_name: dynamic-bot

    # 重启策略
    restart: unless-stopped

    # 环境变量
    # 注意: JVM 内存参数已在 Dockerfile 中通过 JAVA_TOOL_OPTIONS 和 CMD 配置
    # 其中默认包含 NMT(summary)；不要在这里设置 JAVA_OPTS，否则会覆盖优化配置与诊断参数
    environment:
      - TZ=Asia/Shanghai

    # 数据卷挂载
    volumes:
      - ./config:/app/config   # 配置文件 (bot.yml, config.yml, data.yml)
      - ./data:/app/data       # 数据目录 (cache/, image_cache/, font/, exception/)
      - ./temp:/app/temp       # 临时文件 (帮助图片等)
      - ./logs:/app/logs       # 日志目录 (daemon/)

    # 网络模式
    network_mode: "bridge"

    # 资源配置 - 默认仅保留 CPU 约束，内存限制由部署侧按需显式配置
    deploy:
      resources:
        limits:
          cpus: '2'
        reservations:
          cpus: '0.5'

    # 运行时内存与交换区限制默认不设置，避免在本地环境引入固定 512MB 硬限制

    # 共享内存配置（纯软件渲染下仍为图形/native 缓冲预留余量）
    shm_size: 256m

    # 日志配置
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "5"
