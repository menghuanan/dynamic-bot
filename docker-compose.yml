version: '3.8'

services:
  dynamic-bot:
    # 镜像标签（默认直接使用 Docker Hub 镜像）
    image: menghuanan/dynamic-bot:latest
    pull_policy: always

    # 容器名称
    container_name: dynamic-bot

    # 重启策略
    restart: unless-stopped

    # 环境变量
    # 注意: JVM 内存参数已在 Dockerfile 中通过 JAVA_TOOL_OPTIONS 和 CMD 配置
    # 其中默认包含 NMT(summary)；不要在这里设置 JAVA_OPTS，否则会覆盖优化配置与诊断参数
    environment:
      - TZ=Asia/Shanghai

    # 数据卷挂载
    volumes:
      - ./config:/app/config   # 配置文件 (bot.yml, config.yml, data.yml)
      - ./data:/app/data       # 数据目录 (cache/, image_cache/, font/, exception/)
      - ./temp:/app/temp       # 临时文件 (帮助图片等)
      - ./logs:/app/logs       # 日志目录 (daemon/)

    # 网络模式
    network_mode: "bridge"

    # 资源配置 - 保留 CPU 约束并与运行时内存限制保持一致
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 512m
        reservations:
          cpus: '0.5'

    # 运行时内存限制（按要求保留容器总内存 512MB）
    mem_limit: 512m

    # 共享内存配置（纯软件渲染下仍为图形/native 缓冲预留余量）
    shm_size: 256m

    # 日志配置
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "5"
