# 本文件主要工作流程：
# 1. 在主分支提交、PR 和手动触发时启动 CI。
# 2. 准备 JDK 与 Gradle 构建环境。
# 3. 采集环境信息并执行编译、测试、打包。
# 4. 输出摘要并上传诊断文件。
name: CI Build and Check

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    # 超过 10 分钟自动终止任务；GitHub Actions 会保留当时已输出的日志。
    timeout-minutes: 10

    steps:
    # 步骤 1：拉取仓库代码。
    - name: Checkout Code
      uses: actions/checkout@v4

    # 步骤 2：准备 JDK 17。
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'gradle'

    # 步骤 3：初始化 Gradle 环境。
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4

    # 步骤 4：先采集环境信息。
    - name: Environment Diagnostics
      run: |
        chmod +x gradlew
        mkdir -p diagnostics/ci
        {
          echo "date=$(date --iso-8601=seconds)"
          echo "runner_os=$RUNNER_OS"
          echo "runner_arch=$RUNNER_ARCH"
          echo "github_ref=$GITHUB_REF"
          echo "github_sha=$GITHUB_SHA"
          echo ""
          echo "## java -version"
          java -version
          echo ""
          echo "## gradle --version"
          ./gradlew --version
          echo ""
          echo "## uname -a"
          uname -a
          echo ""
          echo "## df -h"
          df -h
          echo ""
          echo "## free -h"
          free -h || true
        } 2>&1 | tee diagnostics/ci/environment.log
    # 步骤 5：执行编译。
    - name: Compile with Gradle
      id: gradle_compile
      run: |
        set -o pipefail
        ./gradlew compileKotlin compileTestKotlin --stacktrace --info --warning-mode all 2>&1 | tee diagnostics/ci/compile.log

    # 步骤 6：执行测试。
    - name: Test with Gradle
      id: gradle_test
      run: |
        set -o pipefail
        ./gradlew test --stacktrace --info --warning-mode all 2>&1 | tee diagnostics/ci/test.log

    # 步骤 7：执行打包。
    - name: Package with Gradle
      id: gradle_package
      run: |
        set -o pipefail
        ./gradlew assemble --stacktrace --info --warning-mode all 2>&1 | tee diagnostics/ci/package.log

    # 步骤 8：发布构建摘要。
    - name: Publish CI Summary
      if: always()
      run: |
        {
          echo "## CI Build and Check"
          echo ""
          echo "- Event: $GITHUB_EVENT_NAME"
          echo "- Ref: $GITHUB_REF"
          echo "- SHA: $GITHUB_SHA"
          echo "- Compile step: ${{ steps.gradle_compile.outcome }}"
          echo "- Test step: ${{ steps.gradle_test.outcome }}"
          echo "- Package step: ${{ steps.gradle_package.outcome }}"
          echo ""
          echo "### Diagnostic files"
          find diagnostics/ci build/reports build/test-results -type f 2>/dev/null | sed 's#^#- #'
        } >> "$GITHUB_STEP_SUMMARY"
    # 步骤 9：上传诊断文件。
    - name: Upload CI Diagnostics
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: ci-diagnostics
        path: |
          diagnostics/ci/**
          build/reports/**
          build/test-results/**
          build/tmp/**
        retention-days: 7
        if-no-files-found: warn
    # 步骤 10：仅在成功时上传构建产物。
    - name: Upload Build Artifact
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: bilibili-dynamic-bot-artifacts.zip
        path: build/libs/*.jar
        retention-days: 7
