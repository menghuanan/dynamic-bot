# 本文件主要工作流程：
# 1. 在版本标签推送时启动发布流程。
# 2. 先校验 Wrapper、准备 JDK 与 Gradle 并构建项目。
# 3. 登录 Docker Hub 并构建推送镜像。
# 4. 选择发布说明并创建 GitHub Release。
name: Build and Release on Tag

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  IMAGE_NAME: menghuanan/dynamic-bot

jobs:
  build:
    runs-on: ubuntu-latest
    # 超过 10 分钟自动终止任务；GitHub Actions 会保留当时已输出的日志。
    timeout-minutes: 10

    steps:
      # 步骤 1：拉取仓库代码。
      - name: Checkout Code
        uses: actions/checkout@v4

      # 步骤 2：校验 Gradle Wrapper。
      - name: Validate Gradle Wrapper
        uses: gradle/actions/wrapper-validation@v4

      # 步骤 3：准备 JDK 17。
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: temurin
          cache: gradle

      # 步骤 4：初始化 Gradle 环境。
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      # 步骤 5：授予 gradlew 可执行权限。
      - name: Enable Gradle Wrapper
        run: chmod +x gradlew

      # 步骤 6：提取纯版本号。
      - name: Set Release Version
        shell: bash
        run: echo "RELEASE_VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      # 步骤 7：按标签样式划分正式发布与预发布。
      - name: Classify Release Channel
        id: release_channel
        shell: bash
        run: |
          release_tag="${GITHUB_REF_NAME}"
          # 带连字符后缀的版本视为预发布，例如 v1.8.5-beta。
          if [[ "${release_tag}" == *-* ]]; then
            echo "is_prerelease=true" >> "${GITHUB_OUTPUT}"
            echo "make_latest=false" >> "${GITHUB_OUTPUT}"
          else
            echo "is_prerelease=false" >> "${GITHUB_OUTPUT}"
            echo "make_latest=true" >> "${GITHUB_OUTPUT}"
          fi
          # Docker 始终推送完整标签，latest 仅保留给正式版。
          {
            echo "docker_tags<<EOF"
            # 精确版本标签直接复用 github.ref_name，保持与现有测试约束一致。
            echo "type=raw,value=${{ github.ref_name }}"
            if [[ "${release_tag}" != *-* ]]; then
              echo "type=raw,value=latest"
            fi
            echo "EOF"
          } >> "${GITHUB_OUTPUT}"

      # 步骤 8：先执行编译并输出详细日志，避免发布构建阶段静默卡住。
      - name: Compile with Gradle
        run: |
          set -o pipefail
          mkdir -p diagnostics/release
          ./gradlew compileKotlin compileTestKotlin -PreleaseVersion=${{ env.RELEASE_VERSION }} --stacktrace --info --warning-mode all 2>&1 | tee diagnostics/release/compile.log

      # 步骤 9：执行测试并持续输出日志，便于定位 test 阶段问题。
      - name: Test with Gradle
        run: |
          set -o pipefail
          ./gradlew test -PreleaseVersion=${{ env.RELEASE_VERSION }} --stacktrace --info --warning-mode all 2>&1 | tee diagnostics/release/test.log

      # 步骤 10：执行打包，确保发布产物沿用 releaseVersion。
      - name: Package with Gradle
        run: |
          set -o pipefail
          ./gradlew assemble -PreleaseVersion=${{ env.RELEASE_VERSION }} --stacktrace --info --warning-mode all 2>&1 | tee diagnostics/release/package.log

      # 步骤 11：上传构建诊断文件，失败时也保留证据。
      - name: Upload Release Diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-diagnostics
          path: |
            diagnostics/release/**
            build/reports/**
            build/test-results/**
            build/tmp/**
          retention-days: 7
          if-no-files-found: warn

      # 步骤 12：初始化 Docker Buildx。
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 步骤 13：登录 Docker Hub。
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 步骤 14：生成镜像元数据。
      - name: Generate Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: ${{ steps.release_channel.outputs.docker_tags }}

      # 步骤 15：构建并推送镜像。
      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            APP_VERSION=${{ env.RELEASE_VERSION }}

      # 步骤 16：先解析发布说明文件。
      - name: Resolve Release Body
        id: release_body
        shell: bash
        run: |
          release_body_path="docs/release/release-${GITHUB_REF_NAME}.md"
          if [[ -f "${release_body_path}" ]]; then
            echo "has_custom_body=true" >> "${GITHUB_OUTPUT}"
            echo "body_path=${release_body_path}" >> "${GITHUB_OUTPUT}"
          else
            echo "has_custom_body=false" >> "${GITHUB_OUTPUT}"
          fi

      # 步骤 17：存在自定义说明时优先创建带定制文案的 Release。
      - name: Create Release with Custom Notes
        if: steps.release_body.outputs.has_custom_body == 'true'
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          prerelease: ${{ steps.release_channel.outputs.is_prerelease }}
          make_latest: ${{ steps.release_channel.outputs.make_latest }}
          body_path: ${{ steps.release_body.outputs.body_path }}
          files: build/libs/*.jar

      # 步骤 18：缺少自定义说明时回退自动生成说明。
      - name: Create Release with Generated Notes
        if: steps.release_body.outputs.has_custom_body != 'true'
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          prerelease: ${{ steps.release_channel.outputs.is_prerelease }}
          make_latest: ${{ steps.release_channel.outputs.make_latest }}
          generate_release_notes: true
          files: build/libs/*.jar
