name: Build and Release on Tag

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  IMAGE_NAME: menghuanan/dynamic-bot

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Validate Gradle Wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: temurin
          cache: gradle

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Enable Gradle Wrapper
        run: chmod +x gradlew

      - name: Set Release Version
        shell: bash
        run: |
          echo "RELEASE_VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"
          if [[ "$GITHUB_REF_NAME" =~ ^v([0-9]+\.[0-9]+)\..+$ ]]; then
            echo "MAJOR_MINOR_TAG=v${BASH_REMATCH[1]}" >> "$GITHUB_ENV"
          else
            echo "MAJOR_MINOR_TAG=$GITHUB_REF_NAME" >> "$GITHUB_ENV"
          fi

      - name: Build with Gradle
        run: ./gradlew build -PreleaseVersion=${{ env.RELEASE_VERSION }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Generate Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ github.ref_name }}
            type=raw,value=${{ env.MAJOR_MINOR_TAG }}
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            APP_VERSION=${{ env.RELEASE_VERSION }}

      - name: Resolve Release Body
        id: release_body
        shell: bash
        run: |
          release_body_path="docs/release/release-${GITHUB_REF_NAME}.md"
          if [[ -f "${release_body_path}" ]]; then
            echo "has_custom_body=true" >> "${GITHUB_OUTPUT}"
            echo "body_path=${release_body_path}" >> "${GITHUB_OUTPUT}"
          else
            echo "has_custom_body=false" >> "${GITHUB_OUTPUT}"
          fi

      - name: Create Release with Custom Notes
        if: steps.release_body.outputs.has_custom_body == 'true'
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          body_path: ${{ steps.release_body.outputs.body_path }}
          files: build/libs/*.jar

      - name: Create Release with Generated Notes
        if: steps.release_body.outputs.has_custom_body != 'true'
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: build/libs/*.jar
